<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Projeto Financeiro</title>
    <!-- Bootstrap para deixar o visual limpo e responsivo -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
        <h3 class="text-center mb-4">Login Financeiro</h3>

        <!-- Exibição de mensagens de erro ou sucesso -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Formulário de Login -->
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="mb-3">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" class="form-control" id="email" name="email" required placeholder="seu@email.com">
            </div>
            <div class="mb-3">
                <label for="senha" class="form-label">Senha</label>
                <input type="password" class="form-control" id="senha" name="senha" required placeholder="Sua senha">
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">Entrar</button>
        </form>

        <!-- Links úteis de Cadastro e Recuperação -->
        <div class="d-flex justify-content-between text-center mt-2">
            <a href="{{ url_for('auth.cadastro') }}" class="text-decoration-none small">Criar conta</a>
            <a href="{{ url_for('auth.recuperar') }}" class="text-decoration-none small">Esqueci a senha</a>
        </div>
    </div>

    <!-- Bootstrap JS Bundle para fechar os alertas -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
